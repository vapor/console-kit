name: test
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request: { types: [opened, reopened, synchronize, ready_for_review] }
  push: { branches: [ main ] }
permissions:
  contents: read

jobs:
  unit-tests:
    permissions:
      contents: read
    uses: vapor/ci/.github/workflows/run-unit-tests.yml@main
    with:
       with_windows: true
       with_musl: true
    secrets: inherit

  submit-dependencies:
    permissions:
      contents: write
    if: ${{ github.event_name == 'push' }}
    uses: vapor/ci/.github/workflows/submit-deps.yml@main
    secrets: inherit

  integration-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container: swift:noble
    steps:
      - uses: actions/checkout@v6
        with: { path: console-kit }
      - uses: actions/checkout@v6
        with: { repository: 'vapor/vapor', path: vapor }
      - run: swift package --package-path vapor edit console-kit --path console-kit
      - run: swift test --package-path vapor
